<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1120;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      max-width: 700px;
      margin: 24px;
      padding: 32px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }
    h1 {
      margin-bottom: 12px;
    }
    p {
      color: #cbd5e1;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #22d3ee;
      color: #04111a;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Comps HQ</h1>
    <p>Homepage is working. Your GitHub Pages site now has a valid index.html file.</p>
